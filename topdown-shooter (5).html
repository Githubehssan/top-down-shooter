      const dx = d.x - cx, dy = d.y - cy;
      ctx.fillStyle = '#ffe066';
      ctx.beginPath(); ctx.arc(dx, dy - 14, 5, 0, TAU); ctx.fill();
    }

    for (const drop of this.drops) {
      if (!dropVisible(drop, p.insideBuilding)) continue;
      if (dist(p, drop) >= 52) continue;
      const dx = drop.x - cx, dy = drop.y - cy;
      ctx.fillStyle = '#7dff7d';
      ctx.beginPath(); ctx.arc(dx, dy - 16, 4, 0, TAU); ctx.fill();
    }

    for (const b of this.bullets) {
      ctx.fillStyle = b.owner === 'player' ? '#ff4' : '#f44';
      ctx.beginPath(); ctx.arc(b.x - cx, b.y - cy, 3, 0, TAU); ctx.fill();
    }

    for (const g of this.grenades) {
      ctx.fillStyle = g.isC4 ? '#a44' : '#4a4';
      ctx.beginPath(); ctx.arc(g.x - cx, g.y - cy, 6, 0, TAU); ctx.fill();
    }

    for (const pt of this.particles) {
      ctx.fillStyle = pt.color; ctx.globalAlpha = pt.life / 500;
      ctx.fillRect(pt.x - cx, pt.y - cy, 4, 4); ctx.globalAlpha = 1;
    }

    if (p.alive) {
      ctx.save();
      ctx.translate(p.x - cx, p.y - cy);
      ctx.rotate(p.angle);
      if (!p.invisible) {
        ctx.fillStyle = '#4af';
        ctx.beginPath(); ctx.arc(0, 0, p.radius, 0, TAU); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.fillRect(8, -3, 14, 6);
      } else { ctx.globalAlpha = 0.3; ctx.fillStyle = '#4af'; ctx.beginPath(); ctx.arc(0, 0, p.radius, 0, TAU); ctx.fill(); ctx.globalAlpha = 1; }
      ctx.restore();
    }

    if (this.isNight) {
      const grad = ctx.createRadialGradient(p.x - cx, p.y - cy, 30, p.x - cx, p.y - cy, 200);
      grad.addColorStop(0, 'rgba(0,0,0,0)'); grad.addColorStop(1, 'rgba(0,0,0,0.85)');
      ctx.fillStyle = grad; ctx.fillRect(0, 0, this.W, this.H);
      ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, this.W, this.H);
    }
    if (this.weather === 'fog') {
      ctx.fillStyle = 'rgba(190,195,205,0.4)';
      ctx.fillRect(0, 0, this.W, this.H);
    } else if (this.weather === 'rain') {
      ctx.fillStyle = 'rgba(100,120,160,0.15)';
      ctx.fillRect(0, 0, this.W, this.H);
    } else if (this.weather === 'sandstorm') {
      ctx.fillStyle = 'rgba(180,150,90,0.25)';
      ctx.fillRect(0, 0, this.W, this.H);
    }

    if (this.flagRaised) {
      this.flagAnim += 0.02;
      const fx = lv.cmdRoom.x + lv.cmdRoom.w / 2 - cx;
      const fy = lv.cmdRoom.y - cy - this.flagAnim * 50;
      ctx.fillStyle = '#f00'; ctx.fillRect(fx, fy, 20, 14);
      ctx.fillStyle = '#888'; ctx.fillRect(fx - 2, fy, 3, 60);
    }
    if (this.alertFlash > 0) {
      ctx.fillStyle = `rgba(255,0,0,${this.alertFlash * 0.03})`;
      ctx.fillRect(0, 0, this.W, this.H);
      this.alertFlash--;
    }

    this.drawHUD();
    this.drawMinimap();
    if (!p.alive) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, this.W, this.H);
      ctx.fillStyle = '#f44'; ctx.font = '24px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('کشته شدی! F = Restart', this.W / 2, this.H / 2);
      ctx.textAlign = 'left';
    }
  }

  drawHUD() {
    const p = this.player;
    const ctx = this.ctx;
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(10, this.H - 80, 300, 70);
    ctx.fillStyle = '#f44'; ctx.fillRect(20, this.H - 70, 180 * (p.hp / p.maxHp), 12);
    ctx.strokeStyle = '#fff'; ctx.strokeRect(20, this.H - 70, 180, 12);
    const wn = p.weapons[p.weaponIdx];
    ctx.fillStyle = '#fff'; ctx.font = '14px sans-serif';
    ctx.fillText(`🔫 ${wn || '-'} | ${p.ammo[wn] || 0} | 💣${p.grenades} | Alert:${Math.floor(this.alertLevel)}`, 20, this.H - 45);
    const wx = this.weatherEndTime ? Math.ceil((this.weatherEndTime - Date.now()) / 1000) + 's' : '';
    ctx.fillText(`Intel:${this.saveData.intel} | F=لوت | C=Craft | ${this.isNight ? '🌙' : '☀️'} ${this.weather}${wx ? '(' + wx + ')' : ''}`, 20, this.H - 25);
    const invIcons = { health:'💊', grenade:'💣', medkit:'🏥', armor:'🛡️', keycard:'🔑', radio:'📡', meat:'🥩', ammo:'🔫', c4:'💥' };
    for (let i = 0; i < 6; i++) {
      const item = p.inventory[i];
      const sx = 320 + i * 38, sy = this.H - 62;
      const sel = i === this.selectedInvSlot;
      ctx.fillStyle = sel ? 'rgba(0,120,200,0.5)' : item ? 'rgba(40,50,70,0.85)' : 'rgba(20,20,30,0.6)';
      ctx.fillRect(sx, sy, 34, 34);
      ctx.strokeStyle = sel ? '#4af' : '#445';
      ctx.lineWidth = sel ? 2.5 : 1.5; ctx.strokeRect(sx, sy, 34, 34);
      if (item) {
        ctx.font = '18px serif';
        ctx.fillText(invIcons[item.type] || '📦', sx + 7, sy + 23);
        if (item.count > 1) { ctx.fillStyle = '#fff'; ctx.font = 'bold 10px sans-serif'; ctx.fillText(item.count, sx + 25, sy + 32); }
      }
      // شماره slot
      ctx.fillStyle = sel ? '#4af' : '#667';
      ctx.font = '9px sans-serif'; ctx.fillText(i+1, sx+2, sy+10);
    }
    ctx.fillStyle='#aaa';ctx.font='11px sans-serif';
    ctx.fillText('Tab=تعویض  Q=استفاده',320,this.H-66);
    if (p.reloading) { ctx.fillStyle = '#fa0'; ctx.fillText('Reloading...', this.W / 2 - 40, this.H - 100); }
  }

  drawMinimap() {
    const mm = this.mmCtx;
    const lv = this.level;
    const scale = 160 / Math.max(lv.mapW, lv.mapH);
    mm.fillStyle = this.isNight ? '#111' : '#333';
    mm.fillRect(0, 0, 160, 160);
    mm.fillStyle = '#666';
    for (let r = 0; r < lv.grid.length; r += 2) for (let c = 0; c < lv.grid[0].length; c += 2)
      if (lv.grid[r][c] === 1) mm.fillRect(c * lv.tile * scale, r * lv.tile * scale, lv.tile * scale * 2, lv.tile * scale * 2);
    mm.fillStyle = '#fa0'; mm.fillRect(lv.mainBase.x * scale, lv.mainBase.y * scale, 8, 8);
    for (const e of this.enemies) if (e.alive) {
      mm.fillStyle = e.alert ? '#f00' : e.state === 'patrol' ? '#a00' : '#f80';
      mm.fillRect(e.x * scale - 1, e.y * scale - 1, 3, 3);
    }
    for (const d of this.drops) {
      if (dist(d, this.player) > 800) continue;
      mm.fillStyle = '#0f0'; mm.fillRect(d.x * scale - 1, d.y * scale - 1, 2, 2);
    }
    mm.fillStyle = '#4af'; mm.fillRect(this.player.x * scale - 2, this.player.y * scale - 2, 4, 4);
    if (this.player.radar) {
      mm.strokeStyle = 'rgba(74,170,255,0.5)'; mm.lineWidth = 1;
      mm.beginPath(); mm.arc(this.player.x * scale, this.player.y * scale, 40, 0, TAU); mm.stroke();
    }
  }

  update(dt) {
    if (this.state !== 'game' || this.paused) return;
    if (this.weatherEndTime && Date.now() > this.weatherEndTime) {
      this.weather = 'clear';
      this.weatherEndTime = 0;
      this.messages.show('مه کنار رفت — دید بهتر شد');
    }
    this.updatePlayer(dt);
    this.updateEnemies(dt);
    this.updateBullets(dt);
    this.updateGrenades(dt);
    this.updateWorld(dt);
    this.messages.update(this, dt);
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const pt = this.particles[i];
      pt.x += pt.vx; pt.y += pt.vy; pt.life -= dt;
      if (pt.life <= 0) this.particles.splice(i, 1);
    }
  }

  loop(ts) {
    if (!this.lastTs) this.lastTs = ts;
    const dt = Math.min(ts - this.lastTs, 50);
    this.lastTs = ts;
    if (this.state === 'game' && !this.paused) {
      this.update(dt);
      this.render();
    }
    requestAnimationFrame(this.loop);
  }
}

const game = new Game();
// پاک کردن cache قدیمی
for(let i=1;i<=50;i++) localStorage.removeItem('levelCache_v5_'+i);
</script>
